<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradient for the main circle -->
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <!-- Gold accent gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f4e5c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <!-- Fashion silhouette clip -->
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="180"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#circleGrad)" stroke="url(#goldGrad)" stroke-width="4"/>

  <!-- Fashion dress silhouette inside circle -->
  <g clip-path="url(#circleClip)" opacity="0.15">
    <path d="M200 60 Q220 80 230 100 Q240 130 235 160 Q230 200 240 240 Q250 280 260 320 L200 340 L140 320 Q150 280 160 240 Q170 200 165 160 Q160 130 170 100 Q180 80 200 60Z" fill="#d4af37"/>
    <!-- Neckline -->
    <path d="M200 60 Q185 75 180 95 Q200 105 220 95 Q215 75 200 60" fill="none" stroke="#d4af37" stroke-width="2"/>
  </g>

  <!-- Main S.O Letters -->
  <text x="200" y="180" font-family="'Playfair Display', 'Georgia', serif" font-size="140" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="-5">S.O</text>

  <!-- Decorative line -->
  <line x1="80" y1="210" x2="320" y2="210" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Brand name in Arabic -->
  <text x="200" y="250" font-family="'Noto Naskh Arabic', 'Arial', serif" font-size="28" fill="#f4e5c2" text-anchor="middle" font-weight="500">سارة عمران</text>

  <!-- English tagline -->
  <text x="200" y="280" font-family="'Montserrat', 'Arial', sans-serif" font-size="14" fill="#b8860b" text-anchor="middle" letter-spacing="4" font-weight="300">HAUTE COUTURE</text>

  <!-- Small decorative dots -->
  <circle cx="120" cy="200" r="4" fill="#d4af37" opacity="0.8"/>
  <circle cx="280" cy="200" r="4" fill="#d4af37" opacity="0.8"/>
</svg>