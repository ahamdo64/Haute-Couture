<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | S.O | سارة عمران</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #d4af37;
            --accent-light: #f4e5c2;
            --white: #ffffff;
            --off-white: #faf8f5;
            --gray: #6b6b6b;
            --light-gray: #e8e8e8;
            --font-ar: 'Noto Naskh Arabic', 'Georgia', serif;
            --font-body: 'Montserrat', 'Arial', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--off-white);
            color: var(--primary);
            line-height: 1.6;
            padding: 40px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            font-family: var(--font-ar);
            font-size: 36px;
            margin-bottom: 30px;
            text-align: center;
            color: var(--primary);
        }
        h1 span { color: var(--accent); }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--white);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid var(--light-gray);
        }
        .stat-card h3 {
            font-family: var(--font-ar);
            font-size: 32px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .stat-card p {
            font-family: var(--font-ar);
            color: var(--gray);
            font-size: 14px;
        }
        .section {
            background: var(--white);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .section h2 {
            font-family: var(--font-ar);
            font-size: 24px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid var(--light-gray);
        }
        th {
            background: var(--primary);
            color: var(--accent);
            font-family: var(--font-ar);
            font-weight: 600;
        }
        tr:hover { background: var(--off-white); }
        .btn {
            padding: 10px 24px;
            background: var(--accent);
            color: var(--primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-ar);
            font-weight: 600;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn:hover { background: var(--accent-light); transform: translateY(-2px); }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #219a52; }
        .actions {
            text-align: center;
            margin-bottom: 40px;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: var(--gray);
            font-family: var(--font-ar);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--accent);
            text-decoration: none;
            font-family: var(--font-ar);
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }
        pre {
            background: var(--primary);
            color: var(--accent-light);
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← العودة للموقع</a>
        <h1>لوحة التحكم <span>S.O</span></h1>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="designCount">0</h3>
                <p>تصميم</p>
            </div>
            <div class="stat-card">
                <h3 id="orderCount">0</h3>
                <p>طلب</p>
            </div>
            <div class="stat-card">
                <h3 id="subscriberCount">0</h3>
                <p>مشترك</p>
            </div>
            <div class="stat-card">
                <h3 id="messageCount">0</h3>
                <p>رسالة</p>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-success" onclick="exportData()">📥 تصدير البيانات</button>
            <button class="btn" onclick="importData()">📤 استيراد البيانات</button>
            <button class="btn btn-danger" onclick="clearAll()">🗑️ مسح جميع البيانات</button>
        </div>

        <div class="section">
            <h2>📦 الطلبات</h2>
            <div id="ordersTable"></div>
        </div>

        <div class="section">
            <h2>✉️ الرسائل</h2>
            <div id="messagesTable"></div>
        </div>

        <div class="section">
            <h2>📧 المشتركون</h2>
            <div id="subscribersTable"></div>
        </div>

        <div class="section">
            <h2>🎨 التصاميم المحفوظة</h2>
            <div id="designsTable"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // DB Object (same as app.js)
        const DB = {
            getDesigns: () => JSON.parse(localStorage.getItem('sara_designs') || '[]'),
            getOrders: () => JSON.parse(localStorage.getItem('sara_orders') || '[]'),
            getSubscribers: () => JSON.parse(localStorage.getItem('sara_subscribers') || '[]'),
            getMessages: () => JSON.parse(localStorage.getItem('sara_messages') || '[]'),
            exportData: function() {
                return JSON.stringify({
                    designs: this.getDesigns(),
                    orders: this.getOrders(),
                    subscribers: this.getSubscribers(),
                    messages: this.getMessages(),
                    exportDate: new Date().toISOString()
                }, null, 2);
            },
            clearAll: function() {
                localStorage.removeItem('sara_designs');
                localStorage.removeItem('sara_orders');
                localStorage.removeItem('sara_subscribers');
                localStorage.removeItem('sara_messages');
                localStorage.removeItem('sara_favorites');
            }
        };

        function loadStats() {
            document.getElementById('designCount').textContent = DB.getDesigns().length;
            document.getElementById('orderCount').textContent = DB.getOrders().length;
            document.getElementById('subscriberCount').textContent = DB.getSubscribers().length;
            document.getElementById('messageCount').textContent = DB.getMessages().length;
        }

        function renderTable(data, columns, containerId) {
            const container = document.getElementById(containerId);
            if (data.length === 0) {
                container.innerHTML = '<div class="empty">لا توجد بيانات</div>';
                return;
            }

            let html = '<table><thead><tr>';
            columns.forEach(col => {
                html += `<th>${col.label}</th>`;
            });
            html += '</tr></thead><tbody>';

            data.forEach(item => {
                html += '<tr>';
                columns.forEach(col => {
                    let value = item[col.key] || '-';
                    if (col.key === 'date' && value !== '-') {
                        value = new Date(value).toLocaleDateString('ar-SA');
                    }
                    html += `<td>${value}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function loadData() {
            const orders = DB.getOrders();
            renderTable(orders, [
                {key: 'designName', label: 'التصميم'},
                {key: 'price', label: 'السعر'},
                {key: 'customerName', label: 'العميل'},
                {key: 'phone', label: 'الهاتف'},
                {key: 'size', label: 'المقاس'},
                {key: 'date', label: 'التاريخ'}
            ], 'ordersTable');

            const messages = DB.getMessages();
            renderTable(messages, [
                {key: 'name', label: 'الاسم'},
                {key: 'email', label: 'البريد'},
                {key: 'subject', label: 'الموضوع'},
                {key: 'message', label: 'الرسالة'},
                {key: 'date', label: 'التاريخ'}
            ], 'messagesTable');

            const subscribers = DB.getSubscribers();
            renderTable(subscribers, [
                {key: 'email', label: 'البريد'},
                {key: 'date', label: 'تاريخ الاشتراك'}
            ], 'subscribersTable');

            const designs = DB.getDesigns();
            renderTable(designs, [
                {key: 'name', label: 'التصميم'},
                {key: 'category', label: 'التصنيف'},
                {key: 'price', label: 'السعر'},
                {key: 'forSale', label: 'للبيع'},
                {key: 'date', label: 'التاريخ'}
            ], 'designsTable');
        }

        function exportData() {
            const data = DB.exportData();
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sara-omran-data-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('تم تصدير البيانات بنجاح!');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.designs) localStorage.setItem('sara_designs', JSON.stringify(data.designs));
                        if (data.orders) localStorage.setItem('sara_orders', JSON.stringify(data.orders));
                        if (data.subscribers) localStorage.setItem('sara_subscribers', JSON.stringify(data.subscribers));
                        if (data.messages) localStorage.setItem('sara_messages', JSON.stringify(data.messages));
                        alert('تم استيراد البيانات بنجاح!');
                        location.reload();
                    } catch (err) {
                        alert('خطأ في استيراد البيانات: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function clearAll() {
            if (confirm('هل أنت متأكدة من مسح جميع البيانات؟ لا يمكن التراجع!')) {
                DB.clearAll();
                alert('تم مسح جميع البيانات');
                location.reload();
            }
        }

        loadStats();
        loadData();
    </script>
</body>
</html>
